<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>Rankhify</title>
    <style>
        :root {
            --bg: #0a0a0a; --card: #141414; --text: #ffffff;
            --accent: #5865f2; --border: #252525;
            --gold: #ffd700; --silver: #c0c0c0; --bronze: #cd7f32;
        }
        * { user-select: none; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; overflow-y: scroll; }
        nav { width: 100%; padding: 20px; background: #000; border-bottom: 2px solid var(--border); text-align: center; font-size: 24px; font-weight: 900; color: var(--accent); position: sticky; top: 0; z-index: 10; }
        
        .search-container { padding: 20px; display: flex; justify-content: center; }
        #searchBox { width: 100%; max-width: 500px; padding: 12px 20px; background: #1a1a1a; border: 1px solid var(--border); color: white; border-radius: 25px; outline: none; cursor: text; }
        
        .container { width: 100%; max-width: 900px; margin: 0 auto; padding: 20px; }
        .player-row { background: var(--card); border: 1px solid var(--border); padding: 15px 25px; margin-bottom: 10px; display: grid; grid-template-columns: 80px 1.5fr 3.5fr; align-items: center; border-radius: 10px; transition: 0.2s; }
        .player-row:hover { border-color: var(--accent); background: #1a1a1a; }
        
        .rank-id { font-weight: bold; font-size: 22px; text-align: center; }
        .rank-1 { color: var(--gold); } .rank-2 { color: var(--silver); } .rank-3 { color: var(--bronze); }
        
        .player-name { font-size: 18px; font-weight: 700; }
        
        .multi-ranks { display: flex; flex-wrap: wrap; gap: 6px; }
        .tier-tag { display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 800; padding: 5px 10px; border-radius: 5px; background: #000; border: 1px solid #333; }
    </style>
</head>
<body>

<nav>RANKHIFY</nav>

<div class="search-container">
    <input type="text" id="searchBox" placeholder="🔍 Etsi pelaajia..." onkeyup="updateList()">
</div>

<div class="container" id="list-container"></div>

<script>
    // ==========================================
    // MUOKKAA PELAAJIA TÄSTÄ ALTA
    // ==========================================
    const PLAYERS_DATABASE = [
        { 
            name: "MrKetsuppi", 
            ranks: { Sword: "HT5", Crystal: "HT4", UHC: "LT5", Mace: "LT5", Axe: "HT5" } 
        },
        { 
            name: "EsimerkkiPelaaja", 
            ranks: { Sword: "HT1", Mace: "LT1" } 
        }
    ];
    // ==========================================

    // Pisteytysjärjestelmä laskentaan (HT1 paras)
    const TIER_ORDER = {
        "HT1": 1000, "HT2": 900, "HT3": 800, "HT4": 700, "HT5": 600,
        "LT1": 500, "LT2": 400, "LT3": 300, "LT4": 200, "LT5": 100
    };

    const gmIcons = { Sword: "⚔️", Crystal: "🔮", Axe: "🪓", Mace: "🔨", UHC: "🍎" };

    function updateList() {
        const container = document.getElementById('list-container');
        const q = document.getElementById('searchBox').value.toLowerCase();
        container.innerHTML = "";

        const filtered = PLAYERS_DATABASE
            .filter(p => p.name.toLowerCase().includes(q))
            .sort((a, b) => {
                // Lasketaan kokonaispisteet tai paras tieri (tässä paras tieri ratkaisee)
                const bestA = Math.max(...Object.values(a.ranks).map(t => TIER_ORDER[t] || 0));
                const bestB = Math.max(...Object.values(b.ranks).map(t => TIER_ORDER[t] || 0));
                return bestB - bestA;
            });

        filtered.forEach((p, i) => {
            const num = i + 1;
            const rClass = num === 1 ? 'rank-1' : num === 2 ? 'rank-2' : num === 3 ? 'rank-3' : '';
            const rIcon = num === 1 ? '🏆' : num === 2 ? '🥈' : num === 3 ? '🥉' : `#${num}`;
            
            const ranksHtml = Object.entries(p.ranks).map(([gm, tr]) => {
                const isHigh = tr.startsWith("HT");
                const borderColor = isHigh ? "var(--gold)" : "#444";
                const textColor = isHigh ? "#fff" : "#888";
                return `<div class="tier-tag" style="border-color: ${borderColor}; color: ${textColor}">${gmIcons[gm] || "❓"} ${tr}</div>`;
            }).join('');
            
            container.innerHTML += `
                <div class="player-row">
                    <div class="rank-id ${rClass}">${rIcon}</div>
                    <div class="player-name">${p.name}</div>
                    <div class="multi-ranks">${ranksHtml}</div>
                </div>`;
        });
    }

    updateList();
</script>
</body>
</html>
