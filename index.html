<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ketchuptiers</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700;800&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303;
            --accent: #ff0000;
            --accent-glow: rgba(255, 0, 0, 0.4);
            --gold: #ffcc00;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 30px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, var(--accent-glow) 0%, transparent 60%);
            animation: drift 15s infinite alternate ease-in-out;
            z-index: -1;
        }

        @keyframes drift {
            from { transform: scale(1) translate(-10%, -10%); }
            to { transform: scale(1.2) translate(10%, 10%); }
        }

        .header-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: clamp(32px, 8vw, 64px);
            font-weight: 800;
            letter-spacing: clamp(4px, 2vw, 15px);
            text-transform: uppercase;
            color: var(--accent);
            text-shadow: 0 0 30px var(--accent-glow);
            margin-bottom: 30px;
            text-align: center;
            width: 100%;
            white-space: nowrap;
        }

        .search-container {
            width: 100%;
            max-width: 900px;
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
        }

        #searchBox {
            width: 100%;
            max-width: 500px;
            padding: 12px 20px;
            background: var(--glass);
            border: 1px solid var(--border);
            color: white;
            border-radius: 25px;
            outline: none;
            backdrop-filter: blur(10px);
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            transition: 0.3s;
        }

        #searchBox:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .leaderboard-container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .player-row {
            display: grid;
            grid-template-columns: 60px 1.5fr 3.5fr;
            align-items: center;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 15px 20px;
            border-radius: 15px;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .player-row:hover {
            transform: scale(1.02);
            border-color: var(--accent);
            background: rgba(255, 0, 0, 0.05);
        }

        .rank-id {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 800;
            font-size: 20px;
            text-align: center;
        }

        .rank-1 { color: var(--gold); filter: drop-shadow(0 0 10px var(--gold)); }
        .rank-other { color: #666; }

        .player-name {
            font-family: 'Rajdhani', sans-serif;
            font-size: clamp(16px, 4vw, 22px);
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .multi-ranks {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: flex-end;
        }

        .tier-tag {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 10px;
            font-weight: 800;
            padding: 5px 10px;
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--gold);
            font-family: 'Rajdhani', sans-serif;
        }

        .ht-tag { color: var(--gold); }
        .lt-tag { color: #888; }

        @media (max-width: 768px) {
            .player-row { grid-template-columns: 40px 1fr; padding: 12px; }
            .multi-ranks { grid-column: 1 / span 2; justify-content: center; margin-top: 10px; }
        }
    </style>
</head>
<body>

    <h1 class="header-title">Ketchuptiers</h1>

    <div class="search-container">
        <input type="text" id="searchBox" placeholder="🔍 Etsi pelaajia..." onkeyup="updateList()">
    </div>

    <div class="leaderboard-container" id="list-container"></div>

    <script>
        const PLAYERS_DATABASE = [
            {
                name: "MrKetsuppi",
                ranks: [
                    { label: "Sword", val: "HT5", type: "ht" },
                    { label: "Crystal", val: "HT4", type: "ht" },
                    { label: "Axe", val: "HT5", type: "ht" },
                    { label: "UHC", val: "LT5", type: "lt" },
                    { label: "Mace", val: "LT5", type: "lt" }
                ]
            },
            {
                name: "YEHORPROMAX",
                ranks: [
                    { label: "Sword", val: "LT5", type: "lt" },
                    { label: "Crystal", val: "LT5", type: "lt" },
                    { label: "Axe", val: "LT5", type: "lt" },
                    { label: "UHC", val: "LT5", type: "lt" },
                    { label: "Mace", val: "LT5", type: "lt" }
                ]
            }
        ];

        const gmIcons = { Sword: "⚔️", Crystal: "🔮", Axe: "🪓", Mace: "🔨", UHC: "🍎" };

        function updateList() {
            const container = document.getElementById('list-container');
            const q = document.getElementById('searchBox').value.toLowerCase();
            container.innerHTML = "";

            // Suodatetaan pelaajat haun mukaan
            const filtered = PLAYERS_DATABASE.filter(p => p.name.toLowerCase().includes(q));

            filtered.forEach((p) => {
                // ETSITÄÄN ALKUPERÄINEN SIJOITUS (Position)
                const realIndex = PLAYERS_DATABASE.findIndex(originalPlayer => originalPlayer.name === p.name);
                const position = realIndex + 1;

                const rClass = position === 1 ? 'rank-1' : 'rank-other';
                const rIcon = position === 1 ? '🏆' : `#${position}`;
                
                const ranksHtml = p.ranks.map(r => {
                    return `
                        <div class="tier-tag ${r.type === 'ht' ? 'ht-tag' : 'lt-tag'}">
                            ${gmIcons[r.label] || "🛡️"} ${r.val}
                        </div>`;
                }).join('');
                
                container.innerHTML += `
                    <div class="player-row">
                        <div class="rank-id ${rClass}">${rIcon}</div>
                        <div class="player-name">${p.name}</div>
                        <div class="multi-ranks">${ranksHtml}</div>
                    </div>`;
            });
        }
        updateList();
    </script>
</body>
</html>
