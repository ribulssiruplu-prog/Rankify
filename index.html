<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>Rankhify</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg: #0a0a0a; --card: #141414; --text: #ffffff;
            --accent: #5865f2; --border: #252525;
            --gold: #ffd700; --silver: #c0c0c0; --bronze: #cd7f32;
            --danger: #ff4747; --success: #43b581;
        }
        * { user-select: none; -webkit-user-select: none; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        nav { width: 100%; padding: 20px; background: #000; border-bottom: 2px solid var(--border); text-align: center; font-size: 24px; font-weight: 900; letter-spacing: 3px; color: var(--accent); }
        
        .search-container { padding: 20px; display: flex; justify-content: center; background: #0d0d0d; }
        #searchBox { width: 100%; max-width: 500px; padding: 12px 20px; background: #1a1a1a; border: 1px solid var(--border); color: white; border-radius: 25px; outline: none; cursor: text; }
        
        .rankings-wrapper { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 950px; }
        
        /* Taulukon tyylit */
        .player-row { 
            background: var(--card); border: 1px solid var(--border); 
            padding: 15px 25px; margin-bottom: 8px; 
            display: grid; grid-template-columns: 80px 1.5fr 3fr 60px; 
            align-items: center; border-radius: 10px; 
            transition: transform 0.2s;
        }
        .player-row:hover { transform: scale(1.01); border-color: #444; }
        
        .rank-id { font-weight: bold; font-size: 22px; text-align: center; }
        .rank-1 { color: var(--gold); text-shadow: 0 0 10px rgba(255, 215, 0, 0.3); }
        .rank-2 { color: var(--silver); }
        .rank-3 { color: var(--bronze); }
        
        .player-name { font-size: 18px; font-weight: 700; color: #eee; }
        
        .multi-ranks { display: flex; flex-wrap: wrap; gap: 8px; }
        .tier-tag { 
            display: flex; align-items: center; gap: 6px; 
            font-size: 12px; font-weight: 800; padding: 6px 12px; 
            border-radius: 6px; background: #1a1a1a; border: 1px solid #333;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }
        
        .edit-btn { background: none; border: none; color: #333; cursor: pointer; font-size: 18px; transition: 0.2s; text-align: right; }
        .edit-btn:hover { color: var(--accent); transform: scale(1.2); }
        
        /* Admin Modal */
        #admin-modal { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-content { background: #161616; padding: 30px; border-radius: 15px; border: 1px solid var(--border); width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; background: #222; border: 1px solid var(--border); color: white; border-radius: 8px; font-size: 14px; }
        button { background: var(--accent); border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { filter: brightness(1.2); }
        .btn-leave { background: #333; margin-top: 15px; }
        .btn-danger { background: var(--danger); }
        .btn-success { background: var(--success); }
        
        .rank-edit-item { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 8px 12px; margin-bottom: 6px; border-radius: 6px; border: 1px solid #333; font-size: 12px; }
        .remove-rank-btn { color: var(--danger); cursor: pointer; font-weight: bold; background: none; border: none; width: auto; padding: 0; }
        .hidden { display: none; }
    </style>
</head>
<body oncontextmenu="return false;">

<nav>RANKHIFY</nav>

<div class="search-container">
    <input type="text" id="searchBox" placeholder="🔍 Etsi pelaajia nimellä..." onkeyup="updateList()">
</div>

<div class="rankings-wrapper">
    <div id="list-container" class="container">
        </div>
</div>

<div id="admin-modal">
    <div class="modal-content" id="login-section">
        <h3 style="text-align:center; margin-top:0;">ADMIN LOGIN 🔐</h3>
        <input type="password" id="passInput" placeholder="Syötä salasana">
        <button onclick="login()">KIRJAUDU</button>
        <button class="btn-leave" onclick="closeModal()">SULJE</button>
    </div>
    <div class="modal-content hidden" id="panel-section">
        <h3 style="color: var(--accent); text-align:center; margin-top:0;">HALLINTAPANEELI</h3>
        <input type="text" id="pName" placeholder="Pelaajan nimi">
        <div id="ranks-list-edit" style="margin: 10px 0; max-height: 150px; overflow-y: auto;"></div>
        <div style="background: #000; padding: 10px; border-radius: 8px; border: 1px solid #333;">
            <select id="pGM">
                <option value="Sword">⚔️ Sword</option><option value="Crystal">🔮 Crystal</option>
                <option value="Axe">🪓 Axe</option><option value="Mace">🔨 Mace</option><option value="UHC">🍎 UHC</option>
            </select>
            <select id="pTier">
                <option value="Coal">⚫ Coal</option><option value="Copper">🟠 Copper</option>
                <option value="Iron">⚪ Iron</option><option value="Diamond">💎 Diamond</option>
                <option value="Emerald">🟢 Emerald</option><option value="Netherite">🔥 Netherite</option>
            </select>
        </div>
        <button onclick="savePlayer()">PÄIVITÄ TIEDOT 🔥</button>
        <div id="ban-controls"></div>
        <button class="btn-leave" onclick="closeModal()">SULJE</button>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyDsPzfddAEvD0vd90_VQ7QkuQC0GDB4840",
      authDomain: "rankhify.firebaseapp.com",
      projectId: "rankhify",
      storageBucket: "rankhify.firebasestorage.app",
      messagingSenderId: "140116755676",
      appId: "1:140116755676:web:c9c23e2e15bcd7ddd36019"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const TIER_POINTS = { "Netherite": 100000, "Emerald": 10000, "Diamond": 1000, "Iron": 100, "Copper": 10, "Coal": 1 };
    const gmIcons = { Sword: "⚔️", Crystal: "🔮", Axe: "🪓", Mace: "🔨", UHC: "🍎" };
    const trIcons = { Coal: "⚫", Copper: "🟠", Iron: "⚪", Diamond: "💎", Emerald: "🟢", Netherite: "🔥" };

    let players = [];
    let editingPlayerKey = null;

    db.ref('players').on('value', (snapshot) => {
        const val = snapshot.val();
        players = val ? Object.entries(val).map(([key, data]) => ({ key, ...data })) : [];
        updateList();
    });

    window.addEventListener('keydown', (e) => {
        if (e.location === 2 && e.key === "Shift") openAdmin();
    });

    function openAdmin(key = null) {
        editingPlayerKey = key;
        document.getElementById('admin-modal').style.display = 'flex';
        const p = players.find(x => x.key === key);
        const ranksArea = document.getElementById('ranks-list-edit');
        const banArea = document.getElementById('ban-controls');
        
        if (p) {
            document.getElementById('pName').value = p.name;
            ranksArea.innerHTML = Object.entries(p.ranks || {}).map(([gm, tr]) => `
                <div class="rank-edit-item">
                    <span>${gmIcons[gm]} ${gm}: ${tr}</span>
                    <button class="remove-rank-btn" onclick="removeRank('${gm}')">X</button>
                </div>
            `).join('');
            banArea.innerHTML = `<button class="${p.banned ? 'btn-success' : 'btn-danger'}" onclick="toggleBan()">${p.banned ? 'POISTA BAN ✅' : 'ANNA BAN ⛔'}</button>`;
        } else {
            document.getElementById('pName').value = "";
            ranksArea.innerHTML = "";
            banArea.innerHTML = "";
        }
    }

    function login() {
        if(document.getElementById('passInput').value === "0204") {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('panel-section').classList.remove('hidden');
        } else { alert("Väärä salasana!"); }
    }

    function closeModal() {
        document.getElementById('admin-modal').style.display = 'none';
        document.getElementById('login-section').classList.remove('hidden');
        document.getElementById('panel-section').classList.add('hidden');
        document.getElementById('passInput').value = "";
    }

    function savePlayer() {
        const name = document.getElementById('pName').value.trim();
        const gm = document.getElementById('pGM').value;
        const tr = document.getElementById('pTier').value;
        if(!name) return;

        let p = players.find(x => x.name.toLowerCase() === name.toLowerCase());
        
        if (p) {
            let updatedRanks = p.ranks || {};
            updatedRanks[gm] = tr;
            db.ref('players/' + p.key).update({ ranks: updatedRanks });
        } else {
            let newRanks = {};
            newRanks[gm] = tr;
            db.ref('players').push({ name, ranks: newRanks, banned: false });
        }
        closeModal();
    }

    function removeRank(gm) {
        const p = players.find(x => x.key === editingPlayerKey);
        if(!p) return;
        let r = p.ranks;
        delete r[gm];
        if (Object.keys(r).length === 0) {
            db.ref('players/' + editingPlayerKey).remove();
            closeModal();
        } else {
            db.ref('players/' + editingPlayerKey + '/ranks').set(r);
            openAdmin(editingPlayerKey);
        }
    }

    function toggleBan() {
        const p = players.find(x => x.key === editingPlayerKey);
        if(!p) return;
        db.ref('players/' + editingPlayerKey).update({ banned: !p.banned });
        closeModal();
    }

    function updateList() {
        const container = document.getElementById('list-container');
        const q = document.getElementById('searchBox').value.toLowerCase();
        container.innerHTML = "";

        const filtered = players
            .filter(p => p.name.toLowerCase().includes(q) && !p.banned)
            .sort((a, b) => {
                const scoreA = Object.values(a.ranks || {}).reduce((s, t) => s + TIER_POINTS[t], 0);
                const scoreB = Object.values(b.ranks || {}).reduce((s, t) => s + TIER_POINTS[t], 0);
                return scoreB - scoreA;
            });

        filtered.forEach((p, i) => {
            const num = i + 1;
            const rClass = num === 1 ? 'rank-1' : num === 2 ? 'rank-2' : num === 3 ? 'rank-3' : '';
            const rIcon = num === 1 ? '🏆' : num === 2 ? '🥈' : num === 3 ? '🥉' : `#${num}`;
            
            const ranksHtml = Object.entries(p.ranks || {}).map(([gm, tr]) => 
                `<div class="tier-tag">${gmIcons[gm]} ${trIcons[tr]} ${tr}</div>`).join('');

            container.innerHTML += `
                <div class="player-row">
                    <div class="rank-id ${rClass}">${rIcon}</div>
                    <div class="player-name">${p.name}</div>
                    <div class="multi-ranks">${ranksHtml}</div>
                    <button class="edit-btn" onclick="openAdmin('${p.key}')">✏️</button>
                </div>`;
        });
    }
</script>
</body>
</html>
